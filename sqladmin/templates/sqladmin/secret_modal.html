{% with secret = get_secret(request) %}
{% if secret %}
<div class="modal modal-blur fade" id="modal-secret" tabindex="-1" role="dialog" aria-hidden="true"
  data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      <div class="modal-status bg-success"></div>
      <div class="modal-body text-center py-4">
        <i class="text-success fa-solid fa-key fa-2x"></i>
        <h3>{{ secret.title }}</h3>
        <div class="text-muted">{{ secret.label }}</div>
        <div class="input-group mt-3">
          <input type="text" class="form-control" value="{{ secret.value }}" readonly id="modal-secret-value">
          <button class="btn btn-outline-secondary" type="button"
            onclick="navigator.clipboard.writeText(document.getElementById('modal-secret-value').value)">
            Copy
          </button>
        </div>
      </div>
      <div class="modal-footer">
        <div class="w-100">
          <div class="row">
            <div class="col">
              <button type="button" class="btn btn-primary w-100" data-bs-dismiss="modal">Done</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    new bootstrap.Modal(document.getElementById('modal-secret')).show();
  });
</script>
{% endif %}
{% endwith %}
