# Babel message extraction configuration for SQLAdmin's own UI strings.
#
# Only templates are scanned. SQLAdmin marks its translatable UI text with
# `_("...")` in the Jinja templates; the WTForms `self.gettext(...)` calls in
# Python are translated by WTForms' own machinery, not by this catalog, so the
# Python sources are intentionally excluded.
#
#   make i18n-extract   # -> sqladmin/translations/admin.pot + update catalogs
#   make i18n-init LOCALE=fr
#   make i18n-compile

[jinja2: sqladmin/templates/**.html]
extensions = jinja2.ext.i18n
